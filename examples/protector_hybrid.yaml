# Hybrid pipeline:
#   1. local heuristics + Presidio strip PII before *any* model call
#   2. local transformers classifier renders a fast verdict (no network)
#   3. cloud OpenAI auditor renders a second opinion
#   4. dual-vote policy: both must say pass
#
# Net effect: cloud LLM never sees raw PII, and you have defense in depth
# against either local or cloud judge being wrong.

version: 1

defaults:
  failure_mode: fail_closed
  mode: enforce
  forward_redacted: true

pre_redactors:
  - kind: presidio
    entities: [US_SSN, CREDIT_CARD, EMAIL_ADDRESS, PHONE_NUMBER, PERSON]
    operator: replace
  - kind: regex_pack

auditor:
  primary:
    kind: transformers
    model: ProtectAI/deberta-v3-base-prompt-injection-v2
    device: cpu
    threshold: 0.85
  secondary:
    kind: openai
    model: gpt-4o-mini
    api_key_env: OPENAI_API_KEY
  policy: any_must_pass         # if either says fail, we fail

prevent:
  pii:
    enabled: true
    action: redact
    apply_to: [input, output]
  secrets:
    enabled: true
    action: block
    apply_to: [input, output]
  prompt_injection:
    enabled: true
    action: block
    apply_to: [input]

cache:
  enabled: true
  backend: memory
  ttl_seconds: 600
