name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel an in-flight run on the same ref when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,yaml,schema]'

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Type check (mypy)
        run: mypy src/prompt_protector/
        # Type checks are advisory while we get the codebase clean.
        continue-on-error: true

      - name: Test
        run: pytest tests/ --tb=short

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: python -m pip install --upgrade pip build

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify the wheel installs cleanly
        run: |
          python -m venv /tmp/wheelcheck
          /tmp/wheelcheck/bin/pip install dist/*.whl
          /tmp/wheelcheck/bin/python -c "import prompt_protector; print('ok', prompt_protector.__version__)"

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
